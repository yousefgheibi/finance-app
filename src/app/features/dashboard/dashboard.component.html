<div class="container-fluid p-0 h-100">
  <div class="row g-3">
    @for (card of financeCards(); track $index) {
    <div class="col-md-3 mb-3">
      <app-finance-card [title]="card.title" [cardClass]="card.cardClass" [deposit]="card.depositTotal"
        [depositWidth]="card.depositWidth" [withdrawal]="card.withdrawalTotal"
        [withdrawalWidth]="card.withdrawalWidth" />
    </div>
    }
  </div>

  <div class="row g-3">
    <div class="col-md-8">
      <div class="bg-white rounded-4 card">
        <app-chart [config]="transactionsAnnualSummaryChart()" />
      </div>
    </div>
    <div class="col-md-4">
      <div class="bg-white rounded-4 card h-100">
        <app-chart [config]="withdrawalTransactionsFilterByCategoryChart()" />
      </div>
    </div>
  </div>
</div>
