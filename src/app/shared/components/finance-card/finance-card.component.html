<div class="finance-card rounded-4 pointer-cursor" [ngClass]="cardClass()">
    <div class="card-body">
        <div class="mb-3">
            <p class="mb-0 fs-16 fw-semibold">{{ title() }}</p>
        </div>

        <div class="d-flex justify-content-between mb-1">
            <span class="text-success fs-12">واریز</span>
            <span class="fs-12"><strong>{{ deposit() | number }}</strong> تومان</span>
        </div>
        <div class="progress mb-2" style="height:6px;">
            <div class="progress-bar bg-success" [style.width.%]="depositWidth()"></div>
        </div>

        <div class="d-flex justify-content-between mb-1">
            <span class="text-danger fs-12">برداشت</span>
            <span class="fs-12"><strong>{{ withdrawal() | number }}</strong> تومان</span>
        </div>
        <div class="progress" style="height:6px;">
            <div class="progress-bar bg-danger" [style.width.%]="withdrawalWidth()"></div>
        </div>

    </div>
</div>
