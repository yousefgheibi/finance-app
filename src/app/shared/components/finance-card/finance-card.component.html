<div class="card finance-card rounded-4 pointer-cursor" [ngClass]="cardClass()">
    <div class="card-body">

        <div class="mb-4">
            <p class="mb-0 fs--20px fw-semibold">{{ title() }}</p>
        </div>

        <div class="d-flex justify-content-between mb-1">
            <span class="text-success fs--10px">واریز</span>
            <span><strong>{{ deposit() | number }}</strong> تومان</span>
        </div>
        <div class="progress mb-3" style="height:6px;">
            <div class="progress-bar bg-success" [style.width.%]="depositWidth()"></div>
        </div>

        <div class="d-flex justify-content-between mb-1">
            <span class="text-danger fs--10px">برداشت</span>
            <span><strong>{{ withdrawal() | number }}</strong> تومان</span>
        </div>
        <div class="progress" style="height:6px;">
            <div class="progress-bar bg-danger" [style.width.%]="withdrawalWidth()"></div>
        </div>

    </div>
</div>
