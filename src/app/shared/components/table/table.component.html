<div class="table-wrapper bg-white rounded-4 shadow-sm">
  @if (loading()) {
  <div class="table-loading">
    <div class="spinner-border text-primary"></div>
  </div>
  }
  @else {
  <div class="table-container">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th class="text-center w-75px mw-75px">عملیات</th>
          @for (col of columns(); track $index) {
          <th [ngClass]="col?.class">{{ col.label }}</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (row of paginatedData(); track $index) {
        <tr>
          <td class="text-center w-75px mw-75px">
            <app-popover>
              <i class="fa-solid fa-ellipsis-vertical" popoverTrigger></i>
              <div popoverContent>
                <ul class="list-group">
                  <ng-container *ngTemplateOutlet="actionsTemplate()!; context: { $implicit: row }" />
                </ul>
              </div>
            </app-popover>
          </td>
          @for (col of columns(); track $index) {
          <td [ngClass]="col.class">{{ row[col.key] }}</td>
          }
        </tr>
        }
      </tbody>
    </table>
  </div>
  }
  <nav class="pagination-container px-3">
    <ul class="pagination mb-3">

      <li class="page-item" [class.disabled]="currentPage() === 1">
        <button class="page-link" (click)="changePage(currentPage() - 1)">→</button>
      </li>

      <li class="page-item" *ngFor="let p of [].constructor(totalPages()); let i = index"
        [class.active]="currentPage() === i + 1">
        <button class="page-link" (click)="changePage(i + 1)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="currentPage() === totalPages()">
        <button class="page-link" (click)="changePage(currentPage() + 1)">←</button>
      </li>

    </ul>
  </nav>

</div>
